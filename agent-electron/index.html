<!DOCTYPE html>
<html>

<head>
    <title>Remote Control Agent</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }

        .status {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 4px;
            background: #333;
        }

        .connected {
            color: #4caf50;
        }

        .disconnected {
            color: #f44336;
        }

        .connecting {
            color: #ff9800;
        }

        h2 {
            margin-top: 0;
        }

        .agent-id {
            font-family: monospace;
            background: #000;
            padding: 5px;
            border-radius: 4px;
            display: block;
            margin-top: 5px;
            font-size: 1.2em;
        }
    </style>
</head>

<body>
    <h2>Replica Agent</h2>
    <div class="status" id="status-box">
        Status: <span id="status-text" class="disconnected">Disconnected</span>
        <div id="agent-id-container" style="margin-top: 10px;">
            Your Agent ID:
            <span class="agent-id" id="agent-id-text">Loading...</span>
        </div>
        <div id="server-url" style="margin-top: 5px; font-size: 0.8em; opacity: 0.6;"></div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const statusText = document.getElementById('status-text');
        const agentIdText = document.getElementById('agent-id-text');
        const serverUrlText = document.getElementById('server-url');

        ipcRenderer.on('status-update', (event, data) => {
            console.log('Received status update:', data);
            statusText.textContent = data.status;

            if (data.status === 'Connected' || data.status === 'Linked & Connected') {
                statusText.className = 'connected';
            } else if (data.status === 'Connecting...') {
                statusText.className = 'connecting';
            } else {
                statusText.className = 'disconnected';
            }

            if (data.agentId) {
                agentIdText.textContent = data.agentId;
            }
            if (data.serverUrl) {
                serverUrlText.textContent = 'Server: ' + data.serverUrl;
            }
        });
    </script>
</body>

</html>
