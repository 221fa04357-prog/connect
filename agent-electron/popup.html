<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; border: 1px solid #444; border-radius: 8px; overflow: hidden; }
        .container { padding: 20px; text-align: center; }
        .host-name { font-weight: bold; color: #4caf50; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        button { padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .accept { background: #4caf50; color: white; }
        .reject { background: #f44336; color: white; }
        .header { background: #333; padding: 10px; border-bottom: 1px solid #444; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header">Remote Control Request</div>
    <div class="container">
        <p><span class="host-name" id="host-name"></span> wants to control your system.</p>
        <div class="buttons">
            <button class="accept" onclick="respond(true)">Accept</button>
            <button class="reject" onclick="respond(false)">Reject</button>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const hostNameSpan = document.getElementById('host-name');

        ipcRenderer.on('request-info', (event, data) => {
            hostNameSpan.textContent = data.hostName;
        });

        function respond(accepted) {
            ipcRenderer.send('control-response', { accepted });
            window.close();
        }
    </script>
</body>
</html>
